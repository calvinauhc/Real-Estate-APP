# transform_dbt/models/staging/schema.yml
version: 2

models:
  - name: stg_hdb_resale
    columns:
      - name: property_id
        tests:
          - unique
          - not_null
      - name: mop_expiry_date
        tests:
          - not_null  # Ensures MOP compliance checks can run
      - name: eip_quota_status
        tests:
          - not_null  # Mandatory for EIP regulatory gatekeeping
      - name: spr_quota_status
        tests:
          - not_null  # Mandatory for SPR quota compliance

  - name: stg_propertyguru_listings
    columns:
      - name: property_id
        tests:
          - unique
          - not_null
      - name: price_psf
        tests:
          - not_null  # Essential for valuation engine calculations